<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>صفحه اصلی</title>
    <style>
        body {
            font-family: Tahoma, Arial, sans-serif;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            text-align: center;
        }

        .box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 50px;
        }

        .logout-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 25px;
            background: rgba(255, 255, 255, 0.9);
            color: #764ba2;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>🎉 خوش اومدی {{ user.username }}!</h1>
        <p>اولین پروژه Django تو با موفقیت کار می‌کنه.</p>
        <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit" class="logout-btn">خروج</button>
        </form>
    </div>
</body>
</html>
